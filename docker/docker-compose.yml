services:
  postgres:
    image: postgres:16
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: empleados
      POSTGRES_USER: empleados
      POSTGRES_PASSWORD: empleados
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: empleados-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_BASIC_AUTH_USER: ${APP_BASIC_AUTH_USER:-admin}
      APP_BASIC_AUTH_PASSWORD: ${APP_BASIC_AUTH_PASSWORD:-change-me}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empleados
      SPRING_DATASOURCE_USERNAME: empleados
      SPRING_DATASOURCE_PASSWORD: empleados
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "${APP_PORT:-8080}:8080"
